<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" width="100%" height="330"><!-- v1 -->
  <defs>
    <linearGradient id="tsBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#58a6ff"><animate attributeName="stop-color" values="#58a6ff;#bc8cff;#ff7b72;#ffa657;#58a6ff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="50%"  stop-color="#bc8cff"><animate attributeName="stop-color" values="#bc8cff;#ff7b72;#ffa657;#58a6ff;#bc8cff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#ff7b72"><animate attributeName="stop-color" values="#ff7b72;#ffa657;#58a6ff;#bc8cff;#ff7b72" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <!-- subtle top-shine on badges for depth -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card + animated border -->
  <rect width="800" height="330" rx="14" fill="#0d1117"/>
  <rect x="1" y="1" width="798" height="328" rx="14" fill="none" stroke="url(#tsBorder)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- ════ ROW 1 · LANGUAGES ════
       7 badges × 82px + 6 gaps × 10px = 634px  →  start x = (800-634)/2 = 83
       badge y = 52, label y = 38                                              -->
  <text x="400" y="38" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#58a6ff">LANGUAGES</text>

  <!-- PHP -->
  <g><rect x="83"  y="52" width="82" height="34" rx="17" fill="#4F5B93"/><rect x="83"  y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="124" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">PHP</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.0s" begin="0.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- JS -->
  <g><rect x="175" y="52" width="82" height="34" rx="17" fill="#F0DB4F"/><rect x="175" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="216" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#1a1a1a">JS</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.4s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- HTML -->
  <g><rect x="267" y="52" width="82" height="34" rx="17" fill="#E44D26"/><rect x="267" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="308" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">HTML5</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2.8s" begin="0.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- CSS -->
  <g><rect x="359" y="52" width="82" height="34" rx="17" fill="#264DE4"/><rect x="359" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="400" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">CSS3</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.6s" begin="0.6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- C -->
  <g><rect x="451" y="52" width="82" height="34" rx="17" fill="#5C6BC0"/><rect x="451" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="492" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">C</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.2s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- C# -->
  <g><rect x="543" y="52" width="82" height="34" rx="17" fill="#9B4F96"/><rect x="543" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="584" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">C#</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2.6s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Dart -->
  <g><rect x="635" y="52" width="82" height="34" rx="17" fill="#0175C2"/><rect x="635" y="52" width="82" height="34" rx="17" fill="url(#shine)"/><text x="676" y="74" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Dart</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.8s" begin="1.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- divider -->
  <line x1="40" y1="108" x2="760" y2="108" stroke="#21262d" stroke-width="1"/>

  <!-- ════ ROW 2 · FRAMEWORKS
       4 badges × 82px + 3 gaps × 10px = 358px  →  start x = (800-358)/2 = 221
       badge y = 148, label y = 134                                            -->
  <text x="400" y="130" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#58a6ff">FRAMEWORKS &amp; LIBRARIES</text>

  <!-- Laravel -->
  <g><rect x="221" y="144" width="82" height="34" rx="17" fill="#F55247"/><rect x="221" y="144" width="82" height="34" rx="17" fill="url(#shine)"/><text x="262" y="166" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Laravel</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.3s" begin="0.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Tailwind -->
  <g><rect x="313" y="144" width="82" height="34" rx="17" fill="#06B6D4"/><rect x="313" y="144" width="82" height="34" rx="17" fill="url(#shine)"/><text x="354" y="166" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Tailwind</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2.9s" begin="0.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Bootstrap -->
  <g><rect x="405" y="144" width="82" height="34" rx="17" fill="#7952B3"/><rect x="405" y="144" width="82" height="34" rx="17" fill="url(#shine)"/><text x="446" y="166" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Bootstrap</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.5s" begin="0.7s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Flutter -->
  <g><rect x="497" y="144" width="82" height="34" rx="17" fill="#027DFD"/><rect x="497" y="144" width="82" height="34" rx="17" fill="url(#shine)"/><text x="538" y="166" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Flutter</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.1s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- divider -->
  <line x1="40" y1="202" x2="760" y2="202" stroke="#21262d" stroke-width="1"/>

  <!-- ════ ROW 3 · DATABASES & TOOLS
       5 badges × 82px + 4 gaps × 10px = 450px  →  start x = (800-450)/2 = 175
       badge y = 240, label y = 226                                            -->
  <text x="400" y="222" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#58a6ff">DATABASES &amp; TOOLS</text>

  <!-- MySQL -->
  <g><rect x="175" y="236" width="82" height="34" rx="17" fill="#00758F"/><rect x="175" y="236" width="82" height="34" rx="17" fill="url(#shine)"/><text x="216" y="258" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">MySQL</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.2s" begin="0.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Git -->
  <g><rect x="267" y="236" width="82" height="34" rx="17" fill="#F05032"/><rect x="267" y="236" width="82" height="34" rx="17" fill="url(#shine)"/><text x="308" y="258" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Git</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="2.7s" begin="0.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- GitHub -->
  <g><rect x="359" y="236" width="82" height="34" rx="17" fill="#6E40C9"/><rect x="359" y="236" width="82" height="34" rx="17" fill="url(#shine)"/><text x="400" y="258" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">GitHub</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.6s" begin="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- VSCode -->
  <g><rect x="451" y="236" width="82" height="34" rx="17" fill="#007ACC"/><rect x="451" y="236" width="82" height="34" rx="17" fill="url(#shine)"/><text x="492" y="258" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">VSCode</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.0s" begin="1.1s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

  <!-- Figma -->
  <g><rect x="543" y="236" width="82" height="34" rx="17" fill="#A259FF"/><rect x="543" y="236" width="82" height="34" rx="17" fill="url(#shine)"/><text x="584" y="258" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#fff">Figma</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3.4s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/></g>

</svg>
