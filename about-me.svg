<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="100%" height="460">
  <defs>
    <!-- Animated gradient border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#ff7b72;#ffa657;#58a6ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#bc8cff">
        <animate attributeName="stop-color" values="#bc8cff;#ff7b72;#ffa657;#58a6ff;#bc8cff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff7b72">
        <animate attributeName="stop-color" values="#ff7b72;#ffa657;#58a6ff;#bc8cff;#ff7b72" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for particles -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Card shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.25"/>
    </filter>

    <!-- Clip for card interior -->
    <clipPath id="cardClip">
      <rect x="6" y="6" width="808" height="448" rx="14"/>
    </clipPath>

    <style>
      .card-bg   { fill: #0d1117; }
      .header-bg { fill: #161b22; }
      .text      { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; }
      .kw        { fill: #ff7b72; font-weight: bold; }
      .val       { fill: #a5d6ff; }
      .br        { fill: #e6edf3; }
      .cm        { fill: #8b949e; font-style: italic; }
      .fn        { fill: #d2a8ff; }
      .str       { fill: #a5d6ff; }
      .num       { fill: #ffa657; }
      .prop      { fill: #79c0ff; }
      .punct     { fill: #e6edf3; }
      .ln        { fill: #30363d; font-size: 13px; text-anchor: end; }
      .mac-r     { fill: #ff5f56; }
      .mac-y     { fill: #ffbd2e; }
      .mac-g     { fill: #27c93f; }
      .title-bar { fill: #8b949e; font-size: 12px; font-family: sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <!-- Outer animated border -->
  <rect x="1" y="1" width="818" height="458" rx="16" fill="none"
        stroke="url(#borderGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Card background -->
  <rect class="card-bg" x="4" y="4" width="812" height="452" rx="14" filter="url(#shadow)"/>

  <!-- ── Floating particles (background layer) ── -->
  <!-- Row 1 -->
  <circle cx="80"  cy="120" r="2" fill="#58a6ff" opacity="0.5" filter="url(#softGlow)">
    <animate attributeName="cy" values="120;90;120" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="200" r="1.5" fill="#bc8cff" opacity="0.6" filter="url(#softGlow)">
    <animate attributeName="cy" values="200;170;200" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="350" r="2.5" fill="#ffa657" opacity="0.4" filter="url(#softGlow)">
    <animate attributeName="cy" values="350;320;350" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55"  cy="320" r="1.8" fill="#3fb950" opacity="0.5" filter="url(#softGlow)">
    <animate attributeName="cy" values="320;295;320" dur="5.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="5.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="790" cy="100" r="2" fill="#ff7b72" opacity="0.45" filter="url(#softGlow)">
    <animate attributeName="cy" values="100;75;100" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="420" r="1.5" fill="#58a6ff" opacity="0.35" filter="url(#softGlow)">
    <animate attributeName="cy" values="420;400;420" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.8;0.35" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Particle drift (horizontal) -->
  <circle cx="150" cy="80" r="1.5" fill="#ffa657" opacity="0.4">
    <animate attributeName="cx" values="150;180;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="650" cy="430" r="2" fill="#bc8cff" opacity="0.4">
    <animate attributeName="cx" values="650;620;650" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Title bar ── -->
  <rect class="header-bg" x="4" y="4" width="812" height="38" rx="14"/>
  <rect class="header-bg" x="4" y="24" width="812" height="18"/>

  <!-- Mac buttons -->
  <circle class="mac-r" cx="28" cy="23" r="6" filter="url(#glow)"/>
  <circle class="mac-y" cx="50" cy="23" r="6" filter="url(#glow)"/>
  <circle class="mac-g" cx="72" cy="23" r="6" filter="url(#glow)"/>

  <!-- Title -->
  <text class="title-bar" x="410" y="27">raihan.js — profile</text>

  <!-- ── Line numbers gutter ── -->
  <rect fill="#0d1117" x="4" y="42" width="36" height="414"/>
  <line x1="40" y1="42" x2="40" y2="456" stroke="#21262d" stroke-width="1"/>

  <!-- Line numbers -->
  <g class="text ln">
    <text x="34" y="72">1</text>
    <text x="34" y="97">2</text>
    <text x="34" y="122">3</text>
    <text x="34" y="147">4</text>
    <text x="34" y="172">5</text>
    <text x="34" y="197">6</text>
    <text x="34" y="222">7</text>
    <text x="34" y="247">8</text>
    <text x="34" y="272">9</text>
    <text x="34" y="297">10</text>
    <text x="34" y="322">11</text>
    <text x="34" y="347">12</text>
    <text x="34" y="372">13</text>
    <text x="34" y="397">14</text>
    <text x="34" y="422">15</text>
    <text x="34" y="447">16</text>
  </g>

  <!-- ── Code content ── -->
  <g class="text" transform="translate(56, 72)">

    <!-- Line 1: comment -->
    <text y="0">
      <tspan class="cm">// 🧑‍💻 Full-Stack Developer — let me introduce myself</tspan>
    </text>

    <!-- Line 2: blank -->

    <!-- Line 3: const Raihan = { -->
    <text y="50">
      <tspan class="kw">const </tspan>
      <tspan class="fn">Raihan</tspan>
      <tspan class="punct"> = {</tspan>
    </text>

    <!-- Line 4: name -->
    <text y="75" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">name</tspan>
      <tspan class="punct">:    </tspan>
      <tspan class="str">"Raihan Aryo Wicaksono"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 5: role -->
    <text y="100" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">role</tspan>
      <tspan class="punct">:    </tspan>
      <tspan class="str">"Software Engineering Student"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 6: location -->
    <text y="125" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">location</tspan>
      <tspan class="punct">: </tspan>
      <tspan class="str">"Indonesia 🇮🇩"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 7: focus -->
    <text y="150" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">focus</tspan>
      <tspan class="punct">:   </tspan>
      <tspan class="str">"Building useful things with clean code"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 8: skills: [ -->
    <text y="175" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">skills</tspan>
      <tspan class="punct">:  [</tspan>
    </text>

    <!-- Line 9 -->
    <text y="200" xml:space="preserve">
      <tspan>    </tspan>
      <tspan class="str">"Laravel"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"PHP"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Flutter"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Dart"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 10 -->
    <text y="225" xml:space="preserve">
      <tspan>    </tspan>
      <tspan class="str">"JavaScript"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"MySQL"</tspan>
      <tspan class="punct">, </tspan>
      <tspan class="str">"Tailwind CSS"</tspan>
    </text>

    <!-- Line 11: ] -->
    <text y="250" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="punct">],</tspan>
    </text>

    <!-- Line 12: learning -->
    <text y="275" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">learning</tspan>
      <tspan class="punct">: </tspan>
      <tspan class="str">"Always exploring new technologies"</tspan>
      <tspan class="punct">,</tspan>
    </text>

    <!-- Line 13: openTo -->
    <text y="300" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">openTo</tspan>
      <tspan class="punct">:  </tspan>
      <tspan class="kw">true</tspan>
      <tspan class="punct">,</tspan>
      <tspan class="cm">  // collaborations &amp; opportunities</tspan>
    </text>

    <!-- Line 14: funFact -->
    <text y="325" xml:space="preserve">
      <tspan>  </tspan>
      <tspan class="prop">funFact</tspan>
      <tspan class="punct">: </tspan>
      <tspan class="str">"I turn ☕ coffee into 💻 code"</tspan>
    </text>

    <!-- Line 15: closing -->
    <text y="350">
      <tspan class="punct">};</tspan>
    </text>

    <!-- Line 16: animated cursor line -->
    <text y="375">
      <tspan class="fn">Raihan</tspan>
      <tspan class="punct">.</tspan>
      <tspan class="fn">sayHello</tspan>
      <tspan class="punct">();</tspan>
      <!-- blinking cursor -->
      <tspan fill="#58a6ff" font-weight="bold">▌
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </tspan>
    </text>

  </g>

  <!-- ── Bottom status bar ── -->
  <rect fill="#1f6feb" x="4" y="439" width="812" height="17" rx="0"/>
  <rect fill="#1f6feb" x="4" y="439" width="812" height="17"/>
  <rect fill="#1f6feb" x="4" y="448" width="812" height="12" rx="0"/>
  <!-- round bottom corners -->
  <rect fill="#1f6feb" x="4" y="443" width="812" height="13" rx="14"/>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="16" y="452">⎇  main</text>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="680" y="452">JavaScript  |  UTF-8  |  Ln 16</text>

</svg>
