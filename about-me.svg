<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="100%" height="520"><!-- v6 -->
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#58a6ff"><animate attributeName="stop-color" values="#58a6ff;#bc8cff;#ff7b72;#ffa657;#58a6ff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="50%"  stop-color="#bc8cff"><animate attributeName="stop-color" values="#bc8cff;#ff7b72;#ffa657;#58a6ff;#bc8cff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#ff7b72"><animate attributeName="stop-color" values="#ff7b72;#ffa657;#58a6ff;#bc8cff;#ff7b72" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .bg  { fill: #0d1117; }
      .hdr { fill: #161b22; }
      .t   { font-family: 'Consolas','Courier New',monospace; font-size: 14px; }
      .kw  { fill: #ff7b72; font-weight: bold; }
      .cm  { fill: #8b949e; font-style: italic; }
      .fn  { fill: #d2a8ff; }
      .str { fill: #a5d6ff; }
      .pr  { fill: #79c0ff; }
      .pu  { fill: #e6edf3; }
      .ln  { fill: #30363d; font-size: 12px; text-anchor: end; }
      .tb  { fill: #8b949e; font-size: 12px; font-family: sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <!-- Border -->
  <rect x="1" y="1" width="818" height="518" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="3" filter="url(#glow)"/>
  <!-- Card -->
  <rect class="bg" x="4" y="4" width="812" height="512" rx="14"/>

  <!-- Particles -->
  <circle cx="78"  cy="130" r="2"   fill="#58a6ff" opacity="0.5" filter="url(#sg)"><animate attributeName="cy" values="130;102;130" dur="5s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5"     dur="5s"   repeatCount="indefinite"/></circle>
  <circle cx="748" cy="210" r="1.5" fill="#bc8cff" opacity="0.6" filter="url(#sg)"><animate attributeName="cy" values="210;182;210" dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;1;0.6"     dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="763" cy="370" r="2.5" fill="#ffa657" opacity="0.4" filter="url(#sg)"><animate attributeName="cy" values="370;342;370" dur="6.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.4"   dur="6.5s" repeatCount="indefinite"/></circle>
  <circle cx="54"  cy="340" r="1.8" fill="#3fb950" opacity="0.5" filter="url(#sg)"><animate attributeName="cy" values="340;312;340" dur="5.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5"     dur="5.8s" repeatCount="indefinite"/></circle>
  <circle cx="791" cy="110" r="2"   fill="#ff7b72" opacity="0.4" filter="url(#sg)"><animate attributeName="cy" values="110;82;110"  dur="4.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.9;0.4"   dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="155" cy="88"  r="1.5" fill="#ffa657" opacity="0.4">                  <animate attributeName="cx" values="155;183;155" dur="8s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.8;0.4"   dur="8s"   repeatCount="indefinite"/></circle>
  <circle cx="648" cy="455" r="2"   fill="#bc8cff" opacity="0.4">                  <animate attributeName="cx" values="648;618;648" dur="9s"   repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.8;0.4"   dur="9s"   repeatCount="indefinite"/></circle>

  <!-- Title bar -->
  <rect class="hdr" x="4" y="4"  width="812" height="38" rx="14"/>
  <rect class="hdr" x="4" y="24" width="812" height="18"/>
  <circle fill="#ff5f56" cx="28" cy="23" r="6" filter="url(#glow)"/>
  <circle fill="#ffbd2e" cx="50" cy="23" r="6" filter="url(#glow)"/>
  <circle fill="#27c93f" cx="72" cy="23" r="6" filter="url(#glow)"/>
  <text class="tb" x="410" y="27">raihan.js — profile</text>

  <!-- Gutter -->
  <rect class="bg" x="4" y="42" width="36" height="452"/>
  <line x1="40" y1="42" x2="40" y2="494" stroke="#21262d" stroke-width="1"/>

  <!-- Line numbers  (base y=68, step=25) -->
  <g class="t ln">
    <text x="34" y="68">1</text>
    <text x="34" y="93">2</text>
    <text x="34" y="118">3</text>
    <text x="34" y="143">4</text>
    <text x="34" y="168">5</text>
    <text x="34" y="193">6</text>
    <text x="34" y="218">7</text>
    <text x="34" y="243">8</text>
    <text x="34" y="268">9</text>
    <text x="34" y="293">10</text>
    <text x="34" y="318">11</text>
    <text x="34" y="343">12</text>
    <text x="34" y="368">13</text>
    <text x="34" y="393">14</text>
    <text x="34" y="418">15</text>
    <text x="34" y="443">16</text>
  </g>

  <!--
    Code block  — group origin at (50, 68)
    Each line: y = (lineNo-1) * 25
    x=0  → unindented
    x=16 → 2-space indent
    x=32 → 4-space indent
  -->
  <g class="t" transform="translate(50,68)">

    <!-- 1: comment -->
    <text x="0" y="0"><tspan class="cm">// 🧑‍💻 Full-Stack Developer — let me introduce myself</tspan></text>

    <!-- 2: blank -->

    <!-- 3: const Raihan = { -->
    <text x="0" y="50"><tspan class="kw">const </tspan><tspan class="fn">Raihan</tspan><tspan class="pu"> = {</tspan></text>

    <!-- 4: name -->
    <text x="16" y="75"><tspan class="pr">name</tspan><tspan class="pu">: </tspan><tspan class="str">"Raihan Aryo Wicaksono"</tspan><tspan class="pu">,</tspan></text>

    <!-- 5: role -->
    <text x="16" y="100"><tspan class="pr">role</tspan><tspan class="pu">: </tspan><tspan class="str">"Software Engineering Student"</tspan><tspan class="pu">,</tspan></text>

    <!-- 6: location -->
    <text x="16" y="125"><tspan class="pr">location</tspan><tspan class="pu">: </tspan><tspan class="str">"Indonesia 🇮🇩"</tspan><tspan class="pu">,</tspan></text>

    <!-- 7: focus -->
    <text x="16" y="150"><tspan class="pr">focus</tspan><tspan class="pu">: </tspan><tspan class="str">"Building useful things with clean code"</tspan><tspan class="pu">,</tspan></text>

    <!-- 8: skills: [ -->
    <text x="16" y="175"><tspan class="pr">skills</tspan><tspan class="pu">: [</tspan></text>

    <!-- 9: skills row 1 -->
    <text x="32" y="200"><tspan class="str">"Laravel"</tspan><tspan class="pu">, </tspan><tspan class="str">"PHP"</tspan><tspan class="pu">, </tspan><tspan class="str">"Flutter"</tspan><tspan class="pu">, </tspan><tspan class="str">"Dart"</tspan><tspan class="pu">,</tspan></text>

    <!-- 10: skills row 2 -->
    <text x="32" y="225"><tspan class="str">"JavaScript"</tspan><tspan class="pu">, </tspan><tspan class="str">"MySQL"</tspan><tspan class="pu">, </tspan><tspan class="str">"Tailwind"</tspan></text>

    <!-- 11: ] -->
    <text x="16" y="250"><tspan class="pu">],</tspan></text>

    <!-- 12: learning -->
    <text x="16" y="275"><tspan class="pr">learning</tspan><tspan class="pu">: </tspan><tspan class="str">"Always exploring new tech"</tspan><tspan class="pu">,</tspan></text>

    <!-- 13: openTo -->
    <text x="16" y="300"><tspan class="pr">openTo</tspan><tspan class="pu">: </tspan><tspan class="kw">true</tspan><tspan class="pu">,</tspan><tspan class="cm">  // collaborations &amp; opportunities</tspan></text>

    <!-- 14: funFact -->
    <text x="16" y="325"><tspan class="pr">funFact</tspan><tspan class="pu">: </tspan><tspan class="str">"I turn ☕ coffee into 💻 code"</tspan></text>

    <!-- 15: }; -->
    <text x="0" y="350"><tspan class="pu">};</tspan></text>

    <!-- 16: cursor  (absolute y = 68+375 = 443, status bar at 494 → 51px clear) -->
    <text x="0" y="375"><tspan class="fn">Raihan</tspan><tspan class="pu">.</tspan><tspan class="fn">sayHello</tspan><tspan class="pu">();</tspan><tspan fill="#58a6ff" font-weight="bold"> ▌<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan></text>

  </g>

  <!-- Status bar  (y=494, height=22, rounded bottom matches card rx=14) -->
  <rect fill="#1f6feb" x="4" y="494" width="812" height="22"/>
  <rect fill="#1f6feb" x="4" y="502" width="812" height="14" rx="14"/>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="16" y="508">⎇  main</text>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="620" y="508">JavaScript  |  UTF-8  |  Ln 16</text>

</svg>
