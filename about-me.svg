<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="100%" height="520"><!-- v5 -->
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff">
        <animate attributeName="stop-color" values="#58a6ff;#bc8cff;#ff7b72;#ffa657;#58a6ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#bc8cff">
        <animate attributeName="stop-color" values="#bc8cff;#ff7b72;#ffa657;#58a6ff;#bc8cff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff7b72">
        <animate attributeName="stop-color" values="#ff7b72;#ffa657;#58a6ff;#bc8cff;#ff7b72" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .card-bg   { fill: #0d1117; }
      .header-bg { fill: #161b22; }
      .text      { font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; }
      .kw        { fill: #ff7b72; font-weight: bold; }
      .cm        { fill: #8b949e; font-style: italic; }
      .fn        { fill: #d2a8ff; }
      .str       { fill: #a5d6ff; }
      .prop      { fill: #79c0ff; }
      .punct     { fill: #e6edf3; }
      .ln        { fill: #30363d; font-size: 13px; text-anchor: end; }
      .mac-r     { fill: #ff5f56; }
      .mac-y     { fill: #ffbd2e; }
      .mac-g     { fill: #27c93f; }
      .title-bar { fill: #8b949e; font-size: 12px; font-family: sans-serif; text-anchor: middle; }
    </style>
  </defs>

  <!-- Outer animated border -->
  <rect x="1" y="1" width="818" height="518" rx="16" fill="none"
        stroke="url(#borderGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Card background -->
  <rect class="card-bg" x="4" y="4" width="812" height="512" rx="14"/>

  <!-- Floating particles -->
  <circle cx="80"  cy="130" r="2"   fill="#58a6ff" opacity="0.5" filter="url(#softGlow)">
    <animate attributeName="cy" values="130;100;130" dur="5s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5"         dur="5s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="745" cy="210" r="1.5" fill="#bc8cff" opacity="0.6" filter="url(#softGlow)">
    <animate attributeName="cy" values="210;180;210" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6"         dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="762" cy="370" r="2.5" fill="#ffa657" opacity="0.4" filter="url(#softGlow)">
    <animate attributeName="cy" values="370;340;370" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.9;0.4"       dur="6.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55"  cy="340" r="1.8" fill="#3fb950" opacity="0.5" filter="url(#softGlow)">
    <animate attributeName="cy" values="340;310;340" dur="5.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5"         dur="5.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="790" cy="110" r="2"   fill="#ff7b72" opacity="0.45" filter="url(#softGlow)">
    <animate attributeName="cy" values="110;80;110"  dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0.9;0.45"     dur="4.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="470" r="1.5" fill="#58a6ff" opacity="0.35" filter="url(#softGlow)">
    <animate attributeName="cy" values="470;450;470" dur="7s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.8;0.35"     dur="7s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="85"  r="1.5" fill="#ffa657" opacity="0.4">
    <animate attributeName="cx" values="155;185;155" dur="8s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4"       dur="8s"   repeatCount="indefinite"/>
  </circle>
  <circle cx="645" cy="460" r="2"   fill="#bc8cff" opacity="0.4">
    <animate attributeName="cx" values="645;615;645" dur="9s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4"       dur="9s"   repeatCount="indefinite"/>
  </circle>

  <!-- Title bar -->
  <rect class="header-bg" x="4" y="4"  width="812" height="38" rx="14"/>
  <rect class="header-bg" x="4" y="24" width="812" height="18"/>

  <!-- Mac buttons -->
  <circle class="mac-r" cx="28" cy="23" r="6" filter="url(#glow)"/>
  <circle class="mac-y" cx="50" cy="23" r="6" filter="url(#glow)"/>
  <circle class="mac-g" cx="72" cy="23" r="6" filter="url(#glow)"/>

  <text class="title-bar" x="410" y="27">raihan.js — profile</text>

  <!-- Line number gutter -->
  <rect fill="#0d1117" x="4"  y="42" width="36"  height="452"/>
  <line x1="40" y1="42" x2="40" y2="494" stroke="#21262d" stroke-width="1"/>

  <!-- Line numbers  (y = 70 + (n-1)*25) -->
  <g class="text ln">
    <text x="34" y="70">1</text>
    <text x="34" y="95">2</text>
    <text x="34" y="120">3</text>
    <text x="34" y="145">4</text>
    <text x="34" y="170">5</text>
    <text x="34" y="195">6</text>
    <text x="34" y="220">7</text>
    <text x="34" y="245">8</text>
    <text x="34" y="270">9</text>
    <text x="34" y="295">10</text>
    <text x="34" y="320">11</text>
    <text x="34" y="345">12</text>
    <text x="34" y="370">13</text>
    <text x="34" y="395">14</text>
    <text x="34" y="420">15</text>
    <text x="34" y="445">16</text>
  </g>

  <!-- Code content  (translate y=70, step=25px → last line at abs y=445) -->
  <g class="text" transform="translate(56, 70)">

    <!-- 1 -->
    <text y="0">
      <tspan class="cm">// 🧑‍💻 Full-Stack Developer — let me introduce myself</tspan>
    </text>

    <!-- 2  blank -->

    <!-- 3 -->
    <text y="50">
      <tspan class="kw">const </tspan><tspan class="fn">Raihan</tspan><tspan class="punct"> = {</tspan>
    </text>

    <!-- 4 -->
    <text y="75" xml:space="preserve">  <tspan class="prop">name</tspan><tspan class="punct">:    </tspan><tspan class="str">"Raihan Aryo Wicaksono"</tspan><tspan class="punct">,</tspan></text>

    <!-- 5 -->
    <text y="100" xml:space="preserve">  <tspan class="prop">role</tspan><tspan class="punct">:    </tspan><tspan class="str">"Software Engineering Student"</tspan><tspan class="punct">,</tspan></text>

    <!-- 6 -->
    <text y="125" xml:space="preserve">  <tspan class="prop">location</tspan><tspan class="punct">: </tspan><tspan class="str">"Indonesia 🇮🇩"</tspan><tspan class="punct">,</tspan></text>

    <!-- 7 -->
    <text y="150" xml:space="preserve">  <tspan class="prop">focus</tspan><tspan class="punct">:   </tspan><tspan class="str">"Building useful things with clean code"</tspan><tspan class="punct">,</tspan></text>

    <!-- 8 -->
    <text y="175" xml:space="preserve">  <tspan class="prop">skills</tspan><tspan class="punct">:  [</tspan></text>

    <!-- 9 -->
    <text y="200" xml:space="preserve">    <tspan class="str">"Laravel"</tspan><tspan class="punct">, </tspan><tspan class="str">"PHP"</tspan><tspan class="punct">, </tspan><tspan class="str">"Flutter"</tspan><tspan class="punct">, </tspan><tspan class="str">"Dart"</tspan><tspan class="punct">,</tspan></text>

    <!-- 10 -->
    <text y="225" xml:space="preserve">    <tspan class="str">"JavaScript"</tspan><tspan class="punct">, </tspan><tspan class="str">"MySQL"</tspan><tspan class="punct">, </tspan><tspan class="str">"Tailwind CSS"</tspan></text>

    <!-- 11 -->
    <text y="250" xml:space="preserve">  <tspan class="punct">],</tspan></text>

    <!-- 12 -->
    <text y="275" xml:space="preserve">  <tspan class="prop">learning</tspan><tspan class="punct">: </tspan><tspan class="str">"Always exploring new technologies"</tspan><tspan class="punct">,</tspan></text>

    <!-- 13 -->
    <text y="300" xml:space="preserve">  <tspan class="prop">openTo</tspan><tspan class="punct">:  </tspan><tspan class="kw">true</tspan><tspan class="punct">,</tspan><tspan class="cm">  // collaborations &amp; opportunities</tspan></text>

    <!-- 14 -->
    <text y="325" xml:space="preserve">  <tspan class="prop">funFact</tspan><tspan class="punct">: </tspan><tspan class="str">"I turn ☕ coffee into 💻 code"</tspan></text>

    <!-- 15 -->
    <text y="350"><tspan class="punct">};</tspan></text>

    <!-- 16  cursor -->
    <text y="375">
      <tspan class="fn">Raihan</tspan><tspan class="punct">.</tspan><tspan class="fn">sayHello</tspan><tspan class="punct">();</tspan>
      <tspan fill="#58a6ff" font-weight="bold">▌<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
    </text>

  </g>

  <!-- Status bar  (y=494, height=22, bottom of card at y=516) -->
  <rect fill="#1f6feb" x="4" y="494" width="812" height="22"/>
  <rect fill="#1f6feb" x="4" y="502" width="812" height="14" rx="14"/>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="16" y="508">⎇  main</text>
  <text font-family="sans-serif" font-size="10" fill="#cdd9e5" x="636" y="508">JavaScript  |  UTF-8  |  Ln 16</text>

</svg>
